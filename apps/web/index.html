<!doctype html>
<html lang="en" style="overflow: hidden; height: 100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>claude-hub</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #15100c;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
      }
      /* Scene swap transition. Keyed by scene id so React unmount/remount
         triggers the animation on every navigation. */
      @keyframes scene-in {
        from {
          opacity: 0;
          transform: scale(0.985);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      /* Workshop ambient + event animations. */
      @keyframes workshop-pulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.06); filter: brightness(1.3); }
      }
      @keyframes workshop-flash {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
      @keyframes workshop-arc {
        0% { opacity: 0; transform: scale(0.85); }
        60% { opacity: 1; }
        100% { opacity: 0; transform: scale(1.15); }
      }
      @keyframes workshop-led {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.6); }
      }
      @keyframes workshop-blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0.25; }
      }
      @media (prefers-reduced-motion: reduce) {
        @keyframes scene-in {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        /* Standard a11y override — collapse every looping animation to a
           single, near-instant tick so nothing animates. Event-driven
           flashes added via React state in Phase 5 still run as one-shots. */
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
