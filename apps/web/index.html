<!doctype html>
<html lang="en" style="overflow: hidden; height: 100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>claude-hub</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #15100c;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
      }
      /* Scene swap transition. Keyed by scene id so React unmount/remount
         triggers the animation on every navigation. */
      @keyframes scene-in {
        from {
          opacity: 0;
          transform: scale(0.985);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        @keyframes scene-in {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
